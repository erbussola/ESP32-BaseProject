; =============================================================================
; ESP32-BaseProject
; File      : platformio.ini
; Versione  : 1.0.0
;
; Scopo:
; Configurazione centrale del progetto PlatformIO.
; Tutte le impostazioni comuni sono definite nella sezione [env] e riutilizzate
; dagli ambienti dev, test e release.
; =============================================================================

[platformio]

description = ESP32-BaseProject
default_envs = dev

; =============================================================================
; Configurazione comune
; =============================================================================

[env]

platform = espressif32
board = esp32dev
framework = arduino

; -----------------------------------------------------------------------------
; Seriale
; -----------------------------------------------------------------------------

monitor_speed = 115200
upload_speed  = 460800

monitor_filters =
    colorize
    time
    esp32_exception_decoder

; -----------------------------------------------------------------------------
; Librerie
; -----------------------------------------------------------------------------

lib_ldf_mode = chain+
lib_compat_mode = strict

; Esempio:
;
; lib_deps =
;     bblanchon/ArduinoJson@^7.4.2
;     knolleary/PubSubClient@^2.8

; -----------------------------------------------------------------------------
; Analisi statica
; -----------------------------------------------------------------------------

check_tool = cppcheck

check_flags =
    cppcheck:
        --enable=warning
        --enable=style
        --enable=performance
        --inline-suppr

; -----------------------------------------------------------------------------
; Build
; -----------------------------------------------------------------------------

build_unflags =
    -Os

build_flags =
    -Wall
    -Wextra
    -Wshadow
    -Wdouble-promotion
    -Winvalid-pch
    -DCORE_DEBUG_LEVEL=3
    -DAPP_NAME=\"ESP32-BaseProject\"

; =============================================================================
; Ambiente di sviluppo
; =============================================================================

[env:dev]

build_type = debug

build_flags =
    ${env.build_flags}
    -DENV_DEV

; =============================================================================
; Ambiente di test
; =============================================================================

[env:test]

build_type = debug

build_flags =
    ${env.build_flags}
    -DENV_TEST

; =============================================================================
; Ambiente di rilascio
; =============================================================================

[env:release]

build_type = release

build_flags =
    ${env.build_flags}
    -DENV_RELEASE
